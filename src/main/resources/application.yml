spring:
  application:
    name: stringpro
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.lausi95.net/realms/stringpro
  docker:
    compose:
      enabled: false
  mongodb:
    uri: ${MONGODB_URI:mongodb://root:example@localhost:27017/stringpro?authSource=admin}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: info
